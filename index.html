<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recueil des attentes</title>

  <link rel="stylesheet" href="./src/styles/base.css" />
  <link rel="stylesheet" href="./src/styles/layout.css" />
  <link rel="stylesheet" href="./src/styles/components.css" />
  <link rel="stylesheet" href="./src/styles/accessibility.css" />
</head>

<body>
  <a class="skip" href="#main">Aller au contenu</a>

  <header class="top">
    <div class="top-inner">
      <div class="brand">
        <div class="logo">
          <img src="./logo-adapei.png" alt="Adapei 49" />
        </div>
        <div>
          <h1>Recueil des attentes</h1>
          <p class="sub">Questionnaire accessible – FALC & audio</p>
        </div>
      </div>

      <span class="badge">
        👤 Éducateur : <strong id="educBadge">à choisir</strong>
      </span>
    </div>
  </header>

  <main id="main" class="main" tabindex="-1">
    <section class="card">

      <!-- STEP 1 : Pôles -->
      <div id="poleStep">
        <h2>Choisir le pôle</h2>

        <!-- Select compat (caché) -->
        <select id="groupSelect" disabled style="display:none;">
          <option value="">— Choisir un groupe —</option>
        </select>

        <div id="groupGrid" class="group-grid" aria-label="Liste des pôles"></div>

        <button class="btn" type="button" id="startBtn">Continuer</button>
        <p id="out" class="out" aria-live="polite"></p>
      </div>

      <!-- STEP 2 : Éducateurs -->
      <div id="educStep" style="display:none;">
        <h2>Choisir le professionnel</h2>

        <div id="educGrid" class="educ-grid" aria-live="polite"></div>

        <!-- Select compat (caché) -->
        <select id="educSelect" style="display:none;">
          <option value="">— Sélectionner —</option>
        </select>

        <div style="display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;">
          <button class="btn secondary" type="button" id="backToPolesBtn">← Retour</button>
          <button class="btn" type="button" id="continueAfterEducBtn" disabled>Continuer</button>
        </div>

        <p id="educOut" class="out" aria-live="polite"></p>
      </div>

    </section>
  </main>

  <!-- pdf-lib en LOCAL (indispensable pour que "Télécharger PDF" marche sans réseau) -->
  <script defer src="./src/libs/pdf-lib.min.js"></script>

  <!-- App -->
  <script defer src="./src/js/app.js"></script>
</body>
</html>
